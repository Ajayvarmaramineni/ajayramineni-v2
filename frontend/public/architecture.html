<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataStatz — Architecture Flow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #070d1a;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}
#toolbar {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(10, 18, 35, 0.94);
  border: 1px solid rgba(148,163,184,0.14);
  border-radius: 14px;
  padding: 7px 16px;
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.45);
}
.tb-logo {
  display: flex; align-items: center; gap-8px;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 800;
  background: linear-gradient(135deg, #38bdf8, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.3px;
  white-space: nowrap;
}
.tb-logo svg { flex-shrink: 0; }
.tb-divider { width:1px; height:20px; background:rgba(148,163,184,0.13); margin:0 3px; }
.tb-btn {
  background: rgba(148,163,184,0.07);
  border: 1px solid rgba(148,163,184,0.16);
  color: #94a3b8;
  border-radius: 8px;
  padding: 5px 11px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.2px;
  transition: all 0.16s;
  display: flex; align-items: center; gap: 5px;
}
.tb-btn:hover { background: rgba(148,163,184,0.14); color: #e2e8f0; border-color: rgba(148,163,184,0.28); }
.tb-btn svg { flex-shrink:0; }
.tb-zoom { display:flex; align-items:center; gap:3px; }
.tb-zoom-val { color:#475569; font-size:11px; min-width:36px; text-align:center; font-variant-numeric: tabular-nums; }
.tb-btn.icon-only { padding: 5px 8px; }
.tb-btn.export {
  background: rgba(56,189,248,0.08);
  border-color: rgba(56,189,248,0.28);
  color: #38bdf8;
}
.tb-btn.export:hover {
  background: rgba(56,189,248,0.16);
  border-color: rgba(56,189,248,0.5);
  color: #7dd3fc;
}
#hint {
  position: fixed;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(100,116,139,0.5);
  font-size: 11px;
  z-index: 100;
  pointer-events: none;
  letter-spacing: 0.4px;
  white-space: nowrap;
}
#container {
  width: 100vw; height: 100vh;
  cursor: grab;
  overflow: hidden;
}
#container.grabbing { cursor: grabbing; }
@keyframes dashFlow {
  to { stroke-dashoffset: -20; }
}
.edge-flow {
  stroke-dasharray: 6 6;
  animation: dashFlow 0.9s linear infinite;
}
</style>
</head>
<body>

<div id="toolbar">
  <div class="tb-logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect width="22" height="22" rx="6" fill="url(#lg)"/>
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="22" y2="22">
          <stop offset="0%" stop-color="#38bdf8"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
      <path d="M5 15l3.5-4.5 2.5 2.5 4.5-5.5" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    DataStatz Architecture
  </div>
  <div class="tb-divider"></div>
  <div class="tb-zoom">
    <button class="tb-btn icon-only" onclick="zoomBy(1.2)" title="Zoom in" id="btnZoomIn"></button>
    <span class="tb-zoom-val" id="zoomVal">75%</span>
    <button class="tb-btn icon-only" onclick="zoomBy(0.83)" title="Zoom out" id="btnZoomOut"></button>
  </div>
  <button class="tb-btn" onclick="resetView()" id="btnFit"></button>
  <div class="tb-divider"></div>
  <button class="tb-btn export" id="exportBtn" onclick="exportPNG()"></button>
</div>

<div id="container">
  <svg id="mainSvg" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">

      <marker id="arr-orange" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><path d="M0.5,1 L6,3.5 L0.5,6 Z" fill="rgba(251,146,60,0.75)"/></marker>
      <marker id="arr-slate"  markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><path d="M0.5,1 L6,3.5 L0.5,6 Z" fill="rgba(148,163,184,0.55)"/></marker>
      <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
        <path d="M44 0L0 0 0 44" fill="none" stroke="rgba(148,163,184,0.04)" stroke-width="1"/>
      </pattern>
    </defs>
    <g id="world"></g>
  </svg>
</div>

<div id="hint">Scroll to zoom &nbsp;·&nbsp; Drag to pan &nbsp;·&nbsp; Export PNG to save</div>

// ─── RENDER ───────────────────────────────────────────────────────────────────
function getNode(id){ return nodes.find(n=>n.id===id); }

function edgePath(e){
  const fn=getNode(e.from), tn=getNode(e.to);
  if(!fn||!tn) return '';
  let x1,y1,x2,y2;
  const rDist = tn.x - (fn.x+NW);
  const lDist = fn.x - (tn.x+NW);
  if(rDist >= -10){
    x1=fn.x+NW; y1=fn.y+NH/2; x2=tn.x; y2=tn.y+NH/2;
  } else if(lDist >= -10){
    x1=fn.x; y1=fn.y+NH/2; x2=tn.x+NW; y2=tn.y+NH/2;
  } else if(tn.y > fn.y+NH-10){
    x1=fn.x+NW/2; y1=fn.y+NH; x2=tn.x+NW/2; y2=tn.y;
  } else {
    x1=fn.x+NW/2; y1=fn.y; x2=tn.x+NW/2; y2=tn.y+NH;
  }
  const dx=Math.abs(x2-x1), dy=Math.abs(y2-y1);
  const cp=Math.max(dx*0.45, Math.min(dy*0.5,150), 50);
  if(dx<15) return `M${x1},${y1} C${x1},${y1+cp*(y2>y1?1:-1)} ${x2},${y2-cp*(y2>y1?1:-1)} ${x2},${y2}`;
  return `M${x1},${y1} C${x1+cp},${y1} ${x2-cp},${y2} ${x2},${y2}`;
}

function render(){
  const world = document.getElementById('world');
  let h = `<rect x="-9999" y="-9999" width="29998" height="29998" fill="url(#grid)"/>`;

  // Section backgrounds
  sections.forEach(s=>{
    const c=SC[s.color];
    h += `<rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" rx="16"
               fill="${c},0.04)" stroke="${c},0.16)" stroke-width="1.2"/>
          <text x="${s.x+14}" y="${s.y+20}" font-size="9.5" font-weight="700"
               fill="${c},0.6)" font-family="-apple-system,sans-serif" letter-spacing="1.2">${s.label}</text>`;
  });

  // Edges
  edges.forEach(e=>{
    const c=SC[e.color]||SC.slate;
    const marker=`url(#${AM[e.color]||'arr-slate'})`;
    const d=edgePath(e);
    if(!d) return;
    h += `<path d="${d}" fill="none" stroke="${c},0.07)" stroke-width="5"/>`;
    if(e.dashed){
      h += `<path d="${d}" fill="none" stroke="${c},0.32)" stroke-width="1.4"
                  stroke-dasharray="6 5" marker-end="${marker}" class="edge-flow"/>`;
    } else {
      h += `<path d="${d}" fill="none" stroke="${c},0.48)" stroke-width="1.5" marker-end="${marker}"/>`;
    }
    if(e.label){
      const fn=getNode(e.from), tn=getNode(e.to);
      if(fn&&tn){
        const mx=(fn.x+NW/2+tn.x+NW/2)/2;
        const my=(fn.y+NH/2+tn.y+NH/2)/2-7;
        h += `<text x="${mx}" y="${my}" text-anchor="middle" font-size="9.5"
                    fill="${c},0.58)" font-family="-apple-system,sans-serif" font-weight="500">${e.label}</text>`;
      }
    }
  });

  // Nodes
  nodes.forEach(n=>{
    const t=T[n.theme]||T.auth;
    const iconSvg = IC[n.icon]
      ? `<svg x="12" y="${NH/2-9}" width="18" height="18" viewBox="0 0 16 16" fill="none" overflow="visible">${IC[n.icon].replace(/\{C\}/g, t.border)}</svg>`
      : '';
    h += `<g transform="translate(${n.x},${n.y})">
      <rect width="${NW}" height="${NH}" rx="11" fill="${t.border}" opacity="0.06" transform="translate(0,4)"/>
      <rect width="${NW}" height="${NH}" rx="11" fill="${t.bg}" stroke="${t.border}" stroke-width="1.4"/>
      <rect x="0" y="13" width="3.5" height="${NH-26}" rx="1.8" fill="${t.border}" opacity="0.85"/>
      <rect x="12" y="0" width="${NW-24}" height="1.5" rx="0.75" fill="rgba(255,255,255,0.05)"/>
      ${iconSvg}
      <text x="38" y="${NH/2-3}" fill="${t.title}" font-size="12.5" font-weight="700"
            font-family="-apple-system,sans-serif">${n.label}</text>
      <text x="38" y="${NH/2+12}" fill="rgba(148,163,184,0.5)" font-size="10"
            font-family="-apple-system,sans-serif">${n.sub}</text>
    </g>`;
  });

}

// ─── PAN / ZOOM ───────────────────────────────────────────────────────────────
let tx=0, ty=50, scale=0.72;
let dragging=false, lx=0, ly=0;

function applyTransform(){
  document.getElementById('world').setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);
  document.getElementById('zoomVal').textContent = Math.round(scale*100)+'%';
}

function zoomBy(f, cx, cy){
  const c=document.getElementById('container');
  if(cx===undefined){cx=c.offsetWidth/2; cy=c.offsetHeight/2;}
  const ns=Math.min(Math.max(scale*f,0.15),4);
  tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale);
  scale=ns; applyTransform();
}

function resetView(){
  const allX=nodes.map(n=>n.x), allY=nodes.map(n=>n.y);
  const minX=Math.min(...allX)-60, minY=Math.min(...allY)-60;
  const maxX=Math.max(...allX)+NW+60, maxY=Math.max(...allY)+NH+60;
  const W=maxX-minX, H=maxY-minY;
  const c=document.getElementById('container');
  const sx=c.offsetWidth/W, sy=c.offsetHeight/H;
  scale=Math.min(sx,sy)*0.9;
  tx=(c.offsetWidth-W*scale)/2-minX*scale;
  ty=(c.offsetHeight-H*scale)/2-minY*scale;
  applyTransform();
}

const cont=document.getElementById('container');
cont.addEventListener('mousedown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;cont.classList.add('grabbing');});
document.addEventListener('mouseup',()=>{dragging=false;cont.classList.remove('grabbing');});
document.addEventListener('mousemove',e=>{
  if(!dragging)return;
  tx+=e.clientX-lx; ty+=e.clientY-ly; lx=e.clientX; ly=e.clientY; applyTransform();
});
cont.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cont.getBoundingClientRect();
  zoomBy(e.deltaY<0?1.1:0.91,e.clientX-r.left,e.clientY-r.top);
},{passive:false});

let touches=[];
cont.addEventListener('touchstart',e=>{touches=[...e.touches];},{passive:true});
cont.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&touches.length===1){
    tx+=e.touches[0].clientX-touches[0].clientX;
    ty+=e.touches[0].clientY-touches[0].clientY;
    applyTransform();
  } else if(e.touches.length===2&&touches.length===2){
    const prev=Math.hypot(touches[1].clientX-touches[0].clientX,touches[1].clientY-touches[0].clientY);
    const curr=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    zoomBy(curr/prev,(e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2);
  }
  touches=[...e.touches];
},{passive:false});

// ─── EXPORT PNG ───────────────────────────────────────────────────────────────
function exportPNG(){
  const btn=document.getElementById('exportBtn');
  btn.innerHTML=icon('arrow-down','#38bdf8',14)+'<span style="margin-left:5px">Exporting…</span>';
  btn.disabled=true;

  const pad=80, RES=2;
  const minX=Math.min(...nodes.map(n=>n.x))-pad;
  const minY=Math.min(...nodes.map(n=>n.y))-pad;
  const maxX=Math.max(...nodes.map(n=>n.x+NW))+pad;
  const maxY=Math.max(...nodes.map(n=>n.y+NH))+pad;
  const VW=maxX-minX, VH=maxY-minY;

  const origSvg=document.getElementById('mainSvg');
  const clone=origSvg.cloneNode(true);
  clone.setAttribute('width',VW); clone.setAttribute('height',VH);
  clone.setAttribute('viewBox',`${minX} ${minY} ${VW} ${VH}`);
  clone.style.width=VW+'px'; clone.style.height=VH+'px';

  clone.querySelectorAll('.edge-flow').forEach(el=>{
    el.classList.remove('edge-flow'); el.style.animation='none';
    el.style.strokeDashoffset='0';
  });

  const wg=clone.querySelector('#world');
  if(wg) wg.setAttribute('transform','');

  const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('x',minX); bg.setAttribute('y',minY);
  bg.setAttribute('width',VW); bg.setAttribute('height',VH);
  bg.setAttribute('fill','#070d1a');
  if(wg) wg.insertBefore(bg,wg.firstChild);

  const wm=document.createElementNS('http://www.w3.org/2000/svg','text');
  wm.setAttribute('x',minX+24); wm.setAttribute('y',maxY-18);
  wm.setAttribute('fill','rgba(148,163,184,0.25)');
  wm.setAttribute('font-size','12');
  wm.setAttribute('font-family','-apple-system, BlinkMacSystemFont, sans-serif');
  wm.setAttribute('font-weight','600');
  wm.textContent='DataStatz — Architecture Flow  ·  datastatz.com';
  if(wg) wg.appendChild(wm);

  const styleEl=document.createElementNS('http://www.w3.org/2000/svg','style');
  styleEl.textContent='text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}';
  clone.insertBefore(styleEl,clone.firstChild);

  const svgStr=new XMLSerializer().serializeToString(clone);
  const blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement('canvas');
    canvas.width=VW*RES; canvas.height=VH*RES;
    const ctx=canvas.getContext('2d');
    ctx.scale(RES,RES);
    ctx.fillStyle='#070d1a'; ctx.fillRect(0,0,VW,VH);
    ctx.drawImage(img,0,0,VW,VH);
    URL.revokeObjectURL(url);
    const link=document.createElement('a');
    link.download='datastatz-architecture.png';
    link.href=canvas.toDataURL('image/png',1.0);
    link.click();
    btn.innerHTML=icon('arrow-down','#38bdf8',14)+'<span style="margin-left:5px">Export PNG</span>';
    btn.disabled=false;
  };
  img.onerror=()=>{
    const link=document.createElement('a');
    link.download='datastatz-architecture.svg'; link.href=url; link.click();
    btn.innerHTML=icon('arrow-down','#38bdf8',14)+'<span style="margin-left:5px">Export PNG</span>';
    btn.disabled=false;
  };
  img.src=url;
}
